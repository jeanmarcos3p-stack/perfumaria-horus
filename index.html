<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfumaria Horus - Perfumes Árabes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--azul:#0a1628;--azul2:#1a2f5e;--azul3:#2a4a8e;--ouro:#c9a84c;--ouro2:#f0d080;--ouro3:#a07830;--branco:#ffffff}
body{font-family:Georgia,serif;background:var(--azul);color:var(--branco)}
header{background:linear-gradient(135deg,var(--azul),var(--azul2));border-bottom:2px solid var(--ouro);padding:15px 0;position:sticky;top:0;z-index:1000;box-shadow:0 4px 20px rgba(201,168,76,0.3)}
.hd{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:15px}
.logo-ico{width:65px;height:65px;background:linear-gradient(135deg,var(--ouro),var(--ouro2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 20px rgba(201,168,76,0.5);border:2px solid var(--ouro2)}
.logo h1{font-size:24px;color:var(--ouro);letter-spacing:3px;text-transform:uppercase}
.logo p{font-size:11px;color:var(--ouro2);letter-spacing:4px;text-transform:uppercase}
.nav-links{display:flex;gap:20px;align-items:center}
.nav-links a{color:var(--ouro2);text-decoration:none;font-size:13px;letter-spacing:1px;text-transform:uppercase;transition:color 0.3s}
.nav-links a:hover{color:var(--ouro)}
.btn-cart{background:linear-gradient(135deg,var(--ouro),var(--ouro3));color:var(--azul);padding:10px 20px;border-radius:25px;font-weight:bold;display:flex;align-items:center;gap:8px;cursor:pointer;border:none;font-size:14px;transition:all 0.3s;font-family:Georgia,serif}
.btn-cart:hover{transform:scale(1.05)}
.cnt{background:var(--azul);color:var(--ouro);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold}
.hero{background:linear-gradient(135deg,var(--azul),var(--azul2),var(--azul));padding:70px 20px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,rgba(201,168,76,0.1),transparent 70%)}
.hero-c{position:relative;z-index:1}
.hero-c .ico{font-size:60px;display:block;margin-bottom:15px}
.hero-c h2{font-size:38px;color:var(--ouro);letter-spacing:5px;text-transform:uppercase;margin-bottom:15px;text-shadow:0 0 30px rgba(201,168,76,0.5)}
.hero-c p{font-size:16px;color:var(--ouro2);letter-spacing:2px;margin-bottom:10px}
.divisor{width:200px;height:2px;background:linear-gradient(90deg,transparent,var(--ouro),transparent);margin:20px auto}
.filtros{background:var(--azul2);padding:20px;border-top:1px solid rgba(201,168,76,0.3);border-bottom:1px solid rgba(201,168,76,0.3)}
.filtros-c{max-width:1200px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center}
.fbtn{background:transparent;border:1px solid var(--ouro);color:var(--ouro);padding:7px 18px;border-radius:20px;cursor:pointer;font-size:12px;letter-spacing:1px;transition:all 0.3s;font-family:Georgia,serif}
.fbtn:hover,.fbtn.ativo{background:var(--ouro);color:var(--azul);font-weight:bold}
.busca{background:rgba(255,255,255,0.1);border:1px solid var(--ouro);color:var(--branco);padding:7px 18px;border-radius:20px;font-size:13px;outline:none;width:220px;font-family:Georgia,serif}
.busca::placeholder{color:rgba(255,255,255,0.5)}
.produtos{max-width:1200px;margin:0 auto;padding:40px 20px}
.sec-title{text-align:center;margin-bottom:35px}
.sec-title h3{font-size:28px;color:var(--ouro);letter-spacing:4px;text-transform:uppercase}
.sec-title span{color:var(--ouro);font-size:18px;display:block;margin:8px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:22px}
.card{background:linear-gradient(135deg,var(--azul2),var(--azul));border:1px solid rgba(201,168,76,0.3);border-radius:15px;overflow:hidden;transition:all 0.3s}
.card:hover{transform:translateY(-8px);border-color:var(--ouro);box-shadow:0 15px 40px rgba(201,168,76,0.3)}
.card-img{width:100%;height:200px;background:linear-gradient(135deg,var(--azul3),var(--azul2));display:flex;align-items:center;justify-content:center;font-size:75px;position:relative}
.badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,var(--ouro),var(--ouro3));color:var(--azul);padding:3px 10px;border-radius:10px;font-size:10px;font-weight:bold}
.card-info{padding:18px}
.marca{font-size:10px;color:var(--ouro);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.nome{font-size:17px;color:var(--branco);margin-bottom:6px;font-weight:bold}
.desc{font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:12px;line-height:1.5}
.notas{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.nota{background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);color:var(--ouro2);padding:2px 8px;border-radius:10px;font-size:10px}
.vol{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:12px}
.btn-add{width:100%;background:linear-gradient(135deg,var(--ouro),var(--ouro3));color:var(--azul);border:none;padding:11px;border-radius:25px;font-size:13px;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:all 0.3s;font-family:Georgia,serif;text-transform:uppercase}
.btn-add:hover{transform:scale(1.02)}
.btn-add.ok{background:linear-gradient(135deg,#2ecc71,#27ae60);color:white}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:2000}
.overlay.open{display:block}
.sidebar{position:fixed;top:0;right:-450px;width:420px;height:100vh;background:linear-gradient(135deg,var(--azul),var(--azul2));border-left:2px solid var(--ouro);z-index:2001;transition:right 0.3s;display:flex;flex-direction:column}
.sidebar.open{right:0}
.cart-hd{padding:22px;border-bottom:1px solid rgba(201,168,76,0.3);display:flex;justify-content:space-between;align-items:center}
.cart-hd h3{color:var(--ouro);font-size:20px;letter-spacing:2px}
.fechar{background:none;border:1px solid var(--ouro);color:var(--ouro);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.3s}
.fechar:hover{background:var(--ouro);color:var(--azul)}
.cart-lista{flex:1;overflow-y:auto;padding:18px}
.vazio{text-align:center;padding:50px 20px;color:rgba(255,255,255,0.5)}
.vazio span{font-size:50px;display:block;margin-bottom:15px}
.item{background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.2);border-radius:10px;padding:13px;margin-bottom:12px;display:flex;gap:12px;align-items:center}
.item-ico{font-size:32px;min-width:45px;text-align:center}
.item-info{flex:1}
.item-nome{color:var(--branco);font-size:14px;font-weight:bold;margin-bottom:2px}
.item-marca{color:var(--ouro);font-size:11px;letter-spacing:1px}
.item-qty{display:flex;align-items:center;gap:8px;margin-top:6px}
.qty-btn{background:rgba(201,168,76,0.2);border:1px solid var(--ouro);color:var(--ouro);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.3s}
.qty-btn:hover{background:var(--ouro);color:var(--azul)}
.qty-n{color:var(--branco);font-size:14px;min-width:20px;text-align:center}
.rm{background:none;border:none;color:rgba(255,100,100,0.7);cursor:pointer;font-size:16px;transition:color 0.3s}
.rm:hover{color:#ff4444}
.cart-ft{padding:20px;border-top:1px solid rgba(201,168,76,0.3)}
.info-box{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:10px;padding:15px;margin-bottom:15px;text-align:center}
.info-box p{color:var(--ouro2);font-size:13px;line-height:1.6}
.btn-wpp{width:100%;background:linear-gradient(135deg,#25d366,#128c7e);color:white;border:none;padding:15px;border-radius:25px;font-size:16px;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:all 0.3s;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-wpp:hover{transform:scale(1.02);box-shadow:0 5px 20px rgba(37,211,102,0.4)}
.rodape{background:linear-gradient(135deg,var(--azul),var(--azul2));border-top:2px solid var(--ouro);padding:40px 20px;text-align:center;margin-top:60px}
.rodape h4{color:var(--ouro);font-size:20px;letter-spacing:3px;margin-bottom:10px}
.rodape p{color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:5px}
.rodape a{color:var(--ouro);text-decoration:none}
.wpp-fixo{position:fixed;bottom:25px;right:25px;background:linear-gradient(135deg,#25d366,#128c7e);color:white;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;text-decoration:none;box-shadow:0 5px 20px rgba(37,211,102,0.5);z-index:999;transition:all 0.3s;animation:pulse 2s infinite}
.wpp-fixo:hover{transform:scale(1.1)}
@keyframes pulse{0%,100%{box-shadow:0 5px 20px rgba(37,211,102,0.5)}50%{box-shadow:0 5px 35px rgba(37,211,102,0.8)}}
@media(max-width:768px){.logo h1{font-size:18px}.hero-c h2{font-size:26px}.sidebar{width:100%}.nav-links{display:none}}
</style>
</head>
<body>
<header>
<div class="hd">
<div class="logo">
<div class="logo-ico">𓂀</div>
<div>
<h1>Perfumaria Horus</h1>
<p>Perfumes Árabes Exclusivos</p>
</div>
</div>
<div class="nav-links">
<a href="#produtos">Catálogo</a>
<a href="#contato">Contato</a>
</div>
<button class="btn-cart" onclick="abrirCarrinho()">🛒 Meu Pedido <span class="cnt" id="cnt">0</span></button>
</div>
</header>
<section class="hero">
<div class="hero-c">
<span class="ico">𓂀</span>
<h2>Perfumaria Horus</h2>
<p>A Arte dos Perfumes do Oriente</p>
<div class="divisor"></div>
<p>Atendimento: Fernanda | (11) 94805-7859</p>
</div>
</section>
<div class="filtros">
<div class="filtros-c">
<input type="text" class="busca" placeholder="🔍 Buscar perfume..." on
